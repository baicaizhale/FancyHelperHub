<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #111; }
      .fg { fill: #F5F4F0; }
      .dim { fill: #F5F4F0; fill-opacity: 0.3; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #F5F4F0; }
      .fg { fill: #111; }
      .dim { fill: #111; fill-opacity: 0.3; }
    }
  </style>

  <!-- Background rounded square -->
  <rect class="bg" width="180" height="180" rx="37" />

  <!-- Command block "bezel" (outer frame) -->
  <rect class="fg" x="38" y="38" width="104" height="104" rx="16" />

  <!-- Inner screen (punched out = bg color) -->
  <rect class="bg" x="46" y="46" width="88" height="88" rx="10" />

  <!-- Command prompt ">" as pixel blocks -->
  <rect class="fg" x="64" y="76" width="8" height="8" rx="1.5" />
  <rect class="fg" x="64" y="92" width="8" height="8" rx="1.5" />
  <rect class="fg" x="74" y="84" width="8" height="8" rx="1.5" />
  <rect class="fg" x="74" y="100" width="8" height="8" rx="1.5" />
  <rect class="fg" x="84" y="92" width="8" height="8" rx="1.5" />

  <!-- Cursor block -->
  <rect class="fg" x="98" y="100" width="8" height="16" rx="1.5" />

  <!-- Decorative dots (command block "pixel grid" feel) -->
  <rect class="dim" x="64" y="64" width="5" height="5" rx="1" />
  <rect class="dim" x="84" y="64" width="5" height="5" rx="1" />
  <rect class="dim" x="84" y="80" width="5" height="5" rx="1" />
</svg>
